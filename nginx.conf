##
## ExpensioAPP — nginx production configuration
## Place in /etc/nginx/sites-available/expensioapp and symlink to sites-enabled
##

server {
    listen 80;
    server_name expensioapp.in www.expensioapp.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name expensioapp.in www.expensioapp.in;

    root /var/www/expensioapp;
    index index.html;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/expensioapp.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expensioapp.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # ── HSTS ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options      "nosniff" always;
    add_header X-Frame-Options             "SAMEORIGIN" always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(self)" always;
    add_header Cross-Origin-Opener-Policy  "same-origin" always;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # ── Service Worker — never cache ──────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Manifest — short cache ────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json";
    }

    # ── Icons — long cache ────────────────────────────────────
    location /icons/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /screenshots/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── HTML — no cache ───────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets — long cache ────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/expensioapp_access.log;
    error_log  /var/log/nginx/expensioapp_error.log;
}
